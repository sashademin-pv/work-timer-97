<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>~* Work Timer 97 *~</title>
<style>
body {
  background-color: #008080;
  font-family: 'Times New Roman', serif;
  color: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}
.window {
  background: #c0c0c0;
  border: 2px outset #fff;
  box-shadow: 2px 2px 0 #000;
  width: 420px;
}
.title-bar {
  background: linear-gradient(90deg, #000080, #1084d0);
  color: #fff;
  font-family: 'Arial', sans-serif;
  font-size: 13px;
  font-weight: bold;
  padding: 3px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.title-bar button {
  background: #c0c0c0;
  border: 2px outset #fff;
  font-size: 10px;
  font-weight: bold;
  width: 18px;
  height: 18px;
  cursor: pointer;
  padding: 0;
  line-height: 14px;
}
.content {
  padding: 16px;
}
.display-panel {
  background: #000;
  color: #0f0;
  font-family: 'Courier New', monospace;
  font-size: 48px;
  text-align: center;
  padding: 16px;
  border: 2px inset #808080;
  margin-bottom: 12px;
  letter-spacing: 4px;
  text-shadow: 0 0 8px #0f0;
}
.status-label {
  font-family: 'Arial', sans-serif;
  font-size: 12px;
  text-align: center;
  margin-bottom: 12px;
  color: #444;
}
.status-label span {
  font-weight: bold;
}
.status-running { color: #a00; }
.status-stopped { color: #444; }
.btn-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.btn {
  font-family: 'Arial', sans-serif;
  font-size: 14px;
  padding: 6px 0;
  flex: 1;
  background: #c0c0c0;
  border: 2px outset #fff;
  cursor: pointer;
}
.btn:active {
  border-style: inset;
}
.btn-start { font-weight: bold; }
.btn-start.running { background: #e06060; }
.separator {
  border: none;
  border-top: 1px solid #808080;
  border-bottom: 1px solid #fff;
  margin: 12px 0;
}
.adjust-section label {
  font-family: 'Arial', sans-serif;
  font-size: 12px;
}
.adjust-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 6px;
}
.adjust-row input {
  width: 60px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  border: 2px inset #808080;
  padding: 3px 4px;
  background: #fff;
}
.adjust-row select {
  font-family: 'Arial', sans-serif;
  font-size: 12px;
  border: 2px inset #808080;
  padding: 2px;
}
.footer {
  text-align: center;
  font-size: 11px;
  color: #666;
  margin-top: 14px;
  font-family: 'Comic Sans MS', 'Arial', sans-serif;
}
.footer img { vertical-align: middle; }
.blink {
  animation: blink 1s step-end infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}
.marquee {
  font-family: 'Comic Sans MS', 'Arial', sans-serif;
  font-size: 11px;
  color: #000080;
  overflow: hidden;
  white-space: nowrap;
  margin-bottom: 8px;
}
.marquee span {
  display: inline-block;
  animation: marquee 12s linear infinite;
}
@keyframes marquee {
  0%   { transform: translateX(100%); }
  100% { transform: translateX(-100%); }
}
.visitor-counter {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  text-align: center;
  margin-top: 6px;
  color: #333;
}
.visitor-counter span {
  background: #000;
  color: #0f0;
  padding: 1px 4px;
  border: 1px inset #808080;
}
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <span>&#128337; WorkTimer97.exe</span>
    <button title="Close">X</button>
  </div>
  <div class="content">
    <div class="marquee"><span>*** Welcome to Work Timer 97 -- Track your productivity like it's 1997! ***</span></div>

    <div class="display-panel" id="display">00:00:00</div>

    <div class="status-label" id="statusLabel">
      Status: <span class="status-stopped">STOPPED</span>
    </div>

    <div class="btn-row">
      <button class="btn btn-start" id="toggleBtn" onclick="toggle()">&#9654; START</button>
      <button class="btn" onclick="resetDay()">&#9724; RESET</button>
    </div>

    <hr class="separator">

    <div class="adjust-section">
      <label>Manual Adjustment:</label>
      <div class="adjust-row">
        <input type="number" id="adjValue" value="15" min="1" max="480">
        <select id="adjUnit">
          <option value="m">minutes</option>
          <option value="h">hours</option>
        </select>
        <button class="btn" onclick="adjust(1)">+ Add</button>
        <button class="btn" onclick="adjust(-1)">- Sub</button>
      </div>
    </div>

    <hr class="separator">

    <div class="footer">
      <span class="blink">&#9733;</span> Best viewed in Netscape Navigator 4.0 <span class="blink">&#9733;</span>
      <div class="visitor-counter">
        You are visitor #<span id="visitorCount">000127</span>
      </div>
    </div>
  </div>
</div>

<script>
const TODAY_KEY = 'workTimer97_' + new Date().toISOString().slice(0, 10);
let running = false;
let startedAt = null;
let tickInterval = null;

function load() {
  const raw = localStorage.getItem(TODAY_KEY);
  if (raw) {
    const data = JSON.parse(raw);
    return data.accumulated || 0;
  }
  return 0;
}

function save(ms) {
  localStorage.setItem(TODAY_KEY, JSON.stringify({ accumulated: ms }));
}

function fmt(ms) {
  if (ms < 0) ms = 0;
  const totalSec = Math.floor(ms / 1000);
  const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
  const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
  const s = String(totalSec % 60).padStart(2, '0');
  return h + ':' + m + ':' + s;
}

function updateDisplay() {
  let total = load();
  if (running && startedAt) {
    total += Date.now() - startedAt;
  }
  document.getElementById('display').textContent = fmt(total);
}

function toggle() {
  const btn = document.getElementById('toggleBtn');
  const label = document.getElementById('statusLabel');
  if (!running) {
    running = true;
    startedAt = Date.now();
    btn.innerHTML = '&#9632; STOP';
    btn.classList.add('running');
    label.innerHTML = 'Status: <span class="status-running blink">RUNNING</span>';
    tickInterval = setInterval(updateDisplay, 500);
  } else {
    running = false;
    const elapsed = Date.now() - startedAt;
    const acc = load() + elapsed;
    save(acc);
    startedAt = null;
    clearInterval(tickInterval);
    btn.innerHTML = '&#9654; START';
    btn.classList.remove('running');
    label.innerHTML = 'Status: <span class="status-stopped">STOPPED</span>';
    updateDisplay();
  }
}

function adjust(sign) {
  const val = parseFloat(document.getElementById('adjValue').value) || 0;
  const unit = document.getElementById('adjUnit').value;
  const ms = val * (unit === 'h' ? 3600000 : 60000) * sign;
  const acc = Math.max(0, load() + ms);
  save(acc);
  updateDisplay();
}

function resetDay() {
  if (confirm('Reset all time for today?')) {
    running = false;
    startedAt = null;
    clearInterval(tickInterval);
    save(0);
    document.getElementById('toggleBtn').innerHTML = '&#9654; START';
    document.getElementById('toggleBtn').classList.remove('running');
    document.getElementById('statusLabel').innerHTML = 'Status: <span class="status-stopped">STOPPED</span>';
    updateDisplay();
  }
}

// visitor counter fun
let vc = parseInt(localStorage.getItem('wt97_visitors') || '126');
vc++;
localStorage.setItem('wt97_visitors', vc);
document.getElementById('visitorCount').textContent = String(vc).padStart(6, '0');

updateDisplay();
</script>

</body>
</html>
